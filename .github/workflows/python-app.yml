# Install dependencies, lint, build, and publish to PyPI.

name: Python application

on:
  push:
    branches:
      - main
    tags:
      - "v*"

  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  # PySide6 6.11 supports Python <3.15
  PYTHON_VERSION: "3.14"

jobs:
  lint-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff build
          pip install .

      - name: Lint with Ruff
        run: |
          ruff check .

      - name: Build package
        run: |
          python -m build

  publish:
    name: Publish to PyPI

    needs: lint-build

    if: startsWith(github.ref, 'refs/tags/v')

    runs-on: ubuntu-latest

    permissions:
      id-token: write

    environment:
      name: pypi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Build source and wheel
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
