# Install dependencies, lint, test, verify packaging, and publish to PyPI.

name: Python application

on:
  push:
    branches:
      - main
    tags:
      - "v*"

  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  # PySide6 6.11 supports Python <3.15
  PYTHON_VERSION: "3.14"

jobs:
  lint-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          pip install -r requirements.lock --require-hashes

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests
        run: pytest

  package:
    needs: lint-test
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Qt runtime libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libnss3 \
            libnspr4 \
            libdbus-1-3 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libxcb-cursor0 \
            libasound2t64 \
            fonts-liberation

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v5
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl

      - name: Install built wheel
        shell: bash
        run: pip install dist/*.whl

      - name: Smoke test
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
          DARKELF_NO_FILTERS: "1"
          DARKELF_AUTOQUIT: "4000"
          QTWEBENGINE_DISABLE_SANDBOX: "1"
          DARKELF_EXTRA_CHROMIUM_FLAGS: "--no-sandbox --disable-gpu"
        run: |
          mkdir -p "$HOME/smoke"
          cd "$HOME/smoke"
          darkelf-shadow
          echo "Packaging smoke test OK"

  publish:
    name: Publish to PyPI

    needs: package

    if: startsWith(github.ref, 'refs/tags/v')

    runs-on: ubuntu-latest

    permissions:
      id-token: write

    environment:
      name: pypi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Build source and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
